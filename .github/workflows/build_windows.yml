name: Build Windows EXE

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller==5.13.2

    - name: Build with PyInstaller
      run: |
        pyinstaller --onefile --noconsole --name AlienBox --add-data "splash_screen_organic_v3_final;splash_screen_organic_v3_final" alienbox_server.py

    - name: Package Windows Installer
      run: |
        mkdir AlienBox_Windows_Installer
        copy dist\AlienBox.exe AlienBox_Windows_Installer\
        xcopy splash_screen_organic_v3_final\* AlienBox_Windows_Installer\Frontend\ /s /e
        copy AlienBox_Manual_Definitivo_Universal_V14.pdf AlienBox_Windows_Installer\
        powershell Compress-Archive -Path AlienBox_Windows_Installer -DestinationPath AlienBox_Windows_Installer.zip -Force

    - name: Upload Windows Artifact
      uses: actions/upload-artifact@v4
      with:
        name: AlienBox_Windows_Installer
        path: AlienBox_Windows_Installer.zip
