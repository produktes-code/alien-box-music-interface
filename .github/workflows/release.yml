name: Release

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}

    steps:
    - uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install "pyinstaller>=6.0.0"
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
      shell: bash

    - name: Build Backend with PyInstaller
      run: |
        pyinstaller --onefile --noconsole --name AlienBox alienbox_server.py
      shell: bash

    - name: Install Node dependencies
      run: npm ci || npm install

    - name: Build with Electron Builder
      run: npx electron-builder --${{ matrix.os == 'macos-latest' && 'mac' || matrix.os == 'windows-latest' && 'win' || 'linux' }} --publish never
      shell: bash

    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: AlienBox_${{ matrix.os }}_Installer
        path: |
          dist-electron/*.exe
          dist-electron/*.dmg
          dist-electron/*.AppImage
          dist-electron/*.deb
