name: Windows Build

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller uvicorn fastapi pydantic

      - name: Build executable with PyInstaller
        run: |
          pyinstaller --name AlienBox --noconsole --onedir alienbox_server.py

      - name: Copy additional assets
        run: |
          mkdir -p dist/AlienBox/Frontend
          cp -r splash_screen_organic_v3_final/* dist/AlienBox/Frontend/
          cp AlienBox_Manual_Definitivo_Universal_V14.pdf dist/AlienBox/
        shell: bash

      - name: Create ZIP archive
        run: |
          Compress-Archive -Path dist/AlienBox -DestinationPath AlienBox_Windows_Portable.zip -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: AlienBox_Windows_Portable.zip
