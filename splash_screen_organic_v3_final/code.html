<style>.fade-in {
    animation: fadeIn 2s ease-out forwards;
    opacity: 0
    }
@keyframes fadeIn {
    from {
        opacity: 0;
        transform: scale(0.95);
        } to {
        opacity: 1;
        transform: scale(1);
        }
    }
.glow-pulse {
    animation: pulseGlow 3s infinite alternate
    }
@keyframes pulseGlow {
    0% {
        filter: drop-shadow(0 0 15px rgba(117, 255, 158, 0.5));
        } 100% {
        filter: drop-shadow(0 0 40px rgba(117, 255, 158, 0.9));
        }
    }
.organic-shader {
    background-image: url(../professional_high_fidelity_sci_fi_cinematic_scene_of_an_extraterrestrial_music/screen.png);
    background-size: cover;
    background-position: center;
    opacity: 0.4;
    mix-blend-mode: screen;
    animation: pulseBackground 8s ease-in-out infinite alternate
    }
@keyframes pulseBackground {
    0% {
        transform: scale(1);
        opacity: 0.3;
        filter: brightness(1);
        } 100% {
        transform: scale(1.05);
        opacity: 0.6;
